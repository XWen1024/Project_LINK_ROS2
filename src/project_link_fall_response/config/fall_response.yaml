fall_camera_node:
  ros__parameters:
    camera_device: /dev/FallCam
    camera_width: 1280
    camera_height: 720
    camera_fps: 15.0
    jpeg_quality: 80
    warmup_frames: 2
    capture_service: /fall_detection/capture_still

fall_response_node:
  ros__parameters:
    assess_action: /fall_detection/assess_fall
    capture_service: /fall_detection/capture_still
    confirm_service: /fall_detection/confirm_alert
    tts_topic: /voice/tts_text
    alert_tts_text: 您看起来摔倒了，正在为您呼叫紧急联系人。
    confirmation_timeout_sec: 15.0
    confidence_threshold: 0.70
    capture_timeout_sec: 3.0
    siliconflow_base_url: https://api.siliconflow.cn/v1
    siliconflow_model: Qwen/Qwen2.5-VL-72B-Instruct
    siliconflow_request_timeout_sec: 20.0
